
services:
  - type: web
    name: ai-resume-screener
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: resume-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: '["*"]'
      - key: OPENAI_API_KEY
        sync: false # User must provide this in dashboard
      - key: SMTP_HOST
        value: sandbox.smtp.mailtrap.io
      - key: SMTP_PORT
        value: '2525'
      - key: SMTP_USER
        value: '70e7565f244781'
      - key: SMTP_PASSWORD
        value: '8b1f7d305bfb57'
      - key: SENDER_EMAIL
        value: support@talentlens.ai
      - key: MOCK_EMAIL
        value: 'false'

  - type: static
    name: talentlens-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-resume-screener
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: resume-db
    databaseName: resume_screener
    user: resume_user
    plan: free # Uses Render's free tier for Postgres
